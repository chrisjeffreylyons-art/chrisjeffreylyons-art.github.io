<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <title>Marketing Trivia - Chris Lyons</title>
        <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
        <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400;1,700&family=Open+Sans:ital,wght@0,300;0,400;0,600;0,700;0,800&display=swap" rel="stylesheet" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
        <link href="css/styles.css" rel="stylesheet" />
        <style>
            .quiz-box {
                background: #fff;
                border: 1px solid #e9ecef;
                border-radius: 1rem;
                padding: 2rem;
                box-shadow: 0 4px 24px rgba(123,47,190,0.08);
            }
            .question-text {
                font-size: 1.2rem;
                font-weight: 700;
                font-family: 'Open Sans', sans-serif;
                color: var(--dark);
                margin-bottom: 1.5rem;
            }
            .answer-btn {
                display: block;
                width: 100%;
                text-align: left;
                background: var(--light-bg);
                border: 2px solid transparent;
                border-radius: 0.6rem;
                padding: 0.75rem 1rem;
                margin-bottom: 0.75rem;
                font-family: 'Open Sans', sans-serif;
                font-size: 0.95rem;
                cursor: pointer;
                transition: all 0.2s;
                color: var(--dark);
            }
            .answer-btn:hover:not(:disabled) {
                border-color: var(--primary);
                background: #f0e6ff;
            }
            .answer-btn.correct {
                background: #d4edda;
                border-color: #28a745;
                color: #155724;
            }
            .answer-btn.wrong {
                background: #f8d7da;
                border-color: #dc3545;
                color: #721c24;
            }
            .progress-bar-custom {
                height: 8px;
                border-radius: 50rem;
                background: #e9ecef;
                margin-bottom: 1.5rem;
                overflow: hidden;
            }
            .progress-fill {
                height: 100%;
                background: var(--primary);
                border-radius: 50rem;
                transition: width 0.4s;
            }
            .score-display {
                font-family: 'Open Sans', sans-serif;
                font-size: 0.85rem;
                color: var(--muted);
                margin-bottom: 0.5rem;
            }
            .next-btn {
                background: var(--primary);
                color: #fff;
                border: none;
                border-radius: 50rem;
                padding: 0.6rem 2rem;
                font-family: 'Open Sans', sans-serif;
                font-weight: 700;
                font-size: 0.9rem;
                cursor: pointer;
                margin-top: 1rem;
                display: none;
                transition: background 0.2s;
            }
            .next-btn:hover { background: var(--primary-dark); }
            .result-box { text-align: center; }
            .result-box .big-score {
                font-size: 4rem;
                font-weight: 800;
                color: var(--primary);
                font-family: 'Open Sans', sans-serif;
                line-height: 1;
            }
            .result-box .result-msg {
                font-size: 1.1rem;
                color: var(--muted);
                margin: 1rem 0 1.5rem;
            }
            .restart-btn {
                background: var(--primary);
                color: #fff;
                border: none;
                border-radius: 50rem;
                padding: 0.75rem 2.5rem;
                font-family: 'Open Sans', sans-serif;
                font-weight: 700;
                font-size: 1rem;
                cursor: pointer;
                transition: background 0.2s;
            }
            .restart-btn:hover { background: var(--primary-dark); }
        </style>
    </head>
    <body>

        <!-- Navigation -->
        <nav class="navbar navbar-expand-lg" id="mainNav">
            <div class="container px-4 px-lg-5">
                <a class="navbar-brand" href="index.html">Chris Lyons</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive"
                    aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
                    Menu <i class="fas fa-bars"></i>
                </button>
                <div class="collapse navbar-collapse" id="navbarResponsive">
                    <ul class="navbar-nav ms-auto py-4 py-lg-0">
                        <li class="nav-item"><a class="nav-link px-lg-3 py-3 py-lg-4" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link px-lg-3 py-3 py-lg-4" href="resume.html">Resume</a></li>
                        <li class="nav-item"><a class="nav-link px-lg-3 py-3 py-lg-4" href="mywork.html">My Work</a></li>
                        <li class="nav-item"><a class="nav-link px-lg-3 py-3 py-lg-4" href="mygame.html">Game</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- Hero -->
        <header class="masthead" style="background-image: url('https://images.unsplash.com/photo-1611532736597-de2d4265fba3?ixlib=rb-4.0.3&auto=format&fit=crop&w=1470&q=80')">
            <div class="container position-relative px-4 px-lg-5">
                <div class="row gx-4 gx-lg-5 justify-content-center">
                    <div class="col-md-10 col-lg-8 col-xl-7">
                        <div class="page-heading">
                            <h1>Marketing Trivia</h1>
                            <span class="subheading">How well do you know digital marketing?</span>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Game -->
        <div class="container px-4 px-lg-5">
            <div class="row gx-4 gx-lg-5 justify-content-center">
                <div class="col-md-10 col-lg-8 col-xl-7">
                    <div class="quiz-box">
                        <div id="quiz-area">
                            <div class="score-display">Question <span id="q-num">1</span> of 8</div>
                            <div class="progress-bar-custom">
                                <div class="progress-fill" id="progress-fill" style="width:12.5%"></div>
                            </div>
                            <div class="question-text" id="question-text"></div>
                            <div id="answers"></div>
                            <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next &rarr;</button>
                        </div>
                        <div id="result-area" class="result-box" style="display:none;">
                            <div class="big-score" id="final-score"></div>
                            <div class="result-msg" id="result-msg"></div>
                            <button class="restart-btn" onclick="restartQuiz()"><i class="fas fa-rotate-right me-2"></i>Play Again</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="border-top">
            <div class="container px-4 px-lg-5">
                <div class="row gx-4 gx-lg-5 justify-content-center">
                    <div class="col-md-10 col-lg-8 col-xl-7">
                        <ul class="list-inline text-center">
                            <li class="list-inline-item">
                                <a href="https://www.linkedin.com/in/chrisj-lyons" target="_blank">
                                    <span class="fa-stack fa-lg">
                                        <i class="fas fa-circle fa-stack-2x"></i>
                                        <i class="fab fa-linkedin-in fa-stack-1x fa-inverse"></i>

                                </a>
                            </li>
                            <li class="list-inline-item">
                                <a href="https://www.facebook.com/christopher.lyons.3517/" target="_blank">
                                    <span class="fa-stack fa-lg">
                                        <i class="fas fa-circle fa-stack-2x"></i>
                                        <i class="fab fa-facebook-f fa-stack-1x fa-inverse"></i>
                                    </span>
                                </a>
                            </li>
                        </ul>
                        <div class="small text-center copyright">Copyright &copy; Chris Lyons 2025</div>
                    </div>
                </div>
            </div>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="js/scripts.js"></script>
        <script>
            const questions = [
                {
                    q: "What does CTR stand for in digital marketing?",
                    answers: ["Click-Through Rate", "Customer Trend Report", "Content Transfer Ratio", "Cost To Reach"],
                    correct: 0
                },
                {
                    q: "Which platform is best known for B2B marketing?",
                    answers: ["TikTok", "Snapchat", "LinkedIn", "Pinterest"],
                    correct: 2
                },
                {
                    q: "What is SEO?",
                    answers: ["Social Engagement Optimization", "Search Engine Optimization", "Sponsored Email Outreach", "Sales Engagement Operations"],
                    correct: 1
                },
                {
                    q: "What does a 'conversion' mean in digital marketing?",
                    answers: ["Changing a logo", "A user completing a desired action", "Switching ad platforms", "Converting video formats"],
                    correct: 1
                },
                {
                    q: "Which AI tool is known for generating marketing images and videos?",
                    answers: ["Excel", "Salesforce", "Higgsfield AI", "QuickBooks"],
                    correct: 2
                },
                {
                    q: "What is 'prompt engineering'?",
                    answers: ["Building websites from scratch", "Crafting effective inputs to get better AI outputs", "Writing email subject lines", "Designing ad layouts"],
                    correct: 1
                },
                {
                    q: "What does ROI stand for?",
                    answers: ["Rate of Influence", "Return on Investment", "Reach of Impact", "Revenue Output Index"],
                    correct: 1
                },
                {
                    q: "Which metric measures how many people saw your ad?",
                    answers: ["Bounce Rate", "Conversion Rate", "Impressions", "Click Depth"],
                    correct: 2
                }
            ];

            let current = 0;
            let score = 0;
            let answered = false;

            function loadQuestion() {
                answered = false;
                const q = questions[current];
                document.getElementById('q-num').textContent = current + 1;
                document.getElementById('progress-fill').style.width = ((current + 1) / questions.length * 100) + '%';
                document.getElementById('question-text').textContent = q.q;
                document.getElementById('next-btn').style.display = 'none';

                const answersDiv = document.getElementById('answers');
                answersDiv.innerHTML = '';
                q.answers.forEach((ans, i) => {
                    const btn = document.createElement('button');
                    btn.className = 'answer-btn';
                    btn.textContent = ans;
                    btn.onclick = () => selectAnswer(i);
                    answersDiv.appendChild(btn);
                });
            }

            function selectAnswer(index) {
                if (answered) return;
                answered = true;
                const q = questions[current];
                const btns = document.querySelectorAll('.answer-btn');
                btns.forEach(b => b.disabled = true);
                if (index === q.correct) {
                    btns[index].classList.add('correct');
                    score++;
                } else {
                    btns[index].classList.add('wrong');
                    btns[q.correct].classList.add('correct');
                }
                document.getElementById('next-btn').style.display = 'inline-block';
            }

            function nextQuestion() {
                current++;
                if (current < questions.length) {
                    loadQuestion();
                } else {
                    showResult();
                }
            }

            function showResult() {
                document.getElementById('quiz-area').style.display = 'none';
                document.getElementById('result-area').style.display = 'block';
                document.getElementById('final-score').textContent = score + ' / ' + questions.length;
                const pct = score / questions.length;
                let msg = '';
                if (pct === 1)       msg = "Perfect score! You\'re a marketing genius. 🎯";
                else if (pct >= 0.75) msg = "Great job! You know your stuff.";
                else if (pct >= 0.5)  msg = "Not bad — keep learning the marketing game!";
                else                  msg = "Room to grow! Brush up on your digital marketing basics.";
                document.getElementById('result-msg').textContent = msg;
            }

            function restartQuiz() {
                current = 0;
                score = 0;
                document.getElementById('quiz-area').style.display = 'block';
                document.getElementById('result-area').style.display = 'none';
                loadQuestion();
            }

            loadQuestion();
        </script>
    </body>
</html>
