        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

        <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ── Constants ──────────────────────────────────────────
        const W = canvas.width;
        const H = canvas.height;
        const PADDLE_W = 90;
        const PADDLE_H = 14;
        const PADDLE_Y = H - 40;
        const ITEM_R = 16;

        // ── State ──────────────────────────────────────────────
        let state = 'start'; // start | playing | paused | dead | over
        let score, lives, level, items, particles, paddle, frameCount, spawnRate;

        function init() {
            score     = 0;
            lives     = 3;
            level     = 1;
            items     = [];
            particles = [];
            frameCount = 0;
            spawnRate  = 80;
            paddle = { x: W / 2 - PADDLE_W / 2, vx: 0 };
        }
        init();

        // ── Input ──────────────────────────────────────────────
        const keys = {};
        window.addEventListener('keydown', e => {
            keys[e.key] = true;
            if (e.key === ' ') {
                e.preventDefault();
                if (state === 'start' || state === 'over') { init(); state = 'playing'; }
                else if (state === 'playing') state = 'paused';
                else if (state === 'paused')  state = 'playing';
            }
        });
        window.addEventListener('keyup', e => { keys[e.key] = false; });

        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = W / rect.width;
            const mx = (e.clientX - rect.left) * scaleX;
            paddle.x = mx - PADDLE_W / 2;
        });

        canvas.addEventListener('click', () => {
            if (state === 'start' || state === 'over') { init(); state = 'playing'; }
            else if (state === 'playing') state = 'paused';
            else if (state === 'paused')  state = 'playing';
        });

        // ── Helpers ────────────────────────────────────────────
        function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

        function spawnItem() {
            const isBomb = Math.random() < 0.3 + level * 0.02;
            items.push({
                x: ITEM_R + Math.random() * (W - ITEM_R * 2),
                y: -ITEM_R,
                vy: 2.5 + level * 0.4 + Math.random() * 1.5,
                bomb: isBomb,
                angle: 0,
                spin: (Math.random() - 0.5) * 0.08
            });
        }

        function spawnParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1.5 + Math.random() * 3;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1,
                    decay: 0.04 + Math.random() * 0.04,
                    r: 3 + Math.random() * 4,
                    color
                });
            }
        }

        // ── Drawing ────────────────────────────────────────────
        function drawStars() {
            if (!drawStars.cache) {
                drawStars.cache = [];
                for (let i = 0; i < 80; i++) {
                    drawStars.cache.push({ x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.5, a: Math.random() });
                }
            }
            drawStars.cache.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255,255,255,${s.a})`;
                ctx.fill();
            });
        }

        function drawPaddle() {
            const x = paddle.x, y = PADDLE_Y;
            // Glow
            ctx.shadowColor = '#b06fff';
            ctx.shadowBlur  = 18;
            // Body
            const grad = ctx.createLinearGradient(x, y, x, y + PADDLE_H);
            grad.addColorStop(0, '#c084ff');
            grad.addColorStop(1, '#7B2FBE');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.roundRect(x, y, PADDLE_W, PADDLE_H, 7);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function drawCoin(x, y, angle) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            // Glow
            ctx.shadowColor = '#FFD700';
            ctx.shadowBlur  = 14;
            // Circle
            ctx.beginPath();
            ctx.arc(0, 0, ITEM_R, 0, Math.PI*2);
            const g = ctx.createRadialGradient(-4, -4, 2, 0, 0, ITEM_R);
            g.addColorStop(0, '#FFE97A');
            g.addColorStop(1, '#C8960C');
            ctx.fillStyle = g;
            ctx.fill();
            // $ symbol
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#7a5900';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('$', 0, 0);
            ctx.restore();
        }

        function drawBomb(x, y, angle) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.shadowColor = '#ff4444';
            ctx.shadowBlur  = 16;
            // Body
            ctx.beginPath();
            ctx.arc(0, 0, ITEM_R, 0, Math.PI*2);
            const g = ctx.createRadialGradient(-4, -4, 2, 0, 0, ITEM_R);
            g.addColorStop(0, '#ff8888');
            g.addColorStop(1, '#aa0000');
            ctx.fillStyle = g;
            ctx.fill();
            // X
            ctx.shadowBlur = 0;
            ctx.strokeStyle = '#ffcccc';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.beginPath(); ctx.moveTo(-7,-7); ctx.lineTo(7,7); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(7,-7);  ctx.lineTo(-7,7); ctx.stroke();
            ctx.restore();
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2);
                ctx.fillStyle = p.color;
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }

        function drawHUD() {
            // Score
            ctx.font = '13px "Press Start 2P"';
            ctx.fillStyle = '#b06fff';
            ctx.textAlign = 'left';
            ctx.shadowColor = '#7B2FBE';
            ctx.shadowBlur = 8;
            ctx.fillText('SCORE: ' + score, 12, 28);

            // Level
            ctx.textAlign = 'center';
            ctx.fillStyle = '#F0A500';
            ctx.fillText('LVL ' + level, W/2, 28);

            // Lives (hearts)
            ctx.textAlign = 'right';
            ctx.shadowBlur = 0;
            for (let i = 0; i < 3; i++) {
                ctx.font = '18px Arial';
                ctx.fillStyle = i < lives ? '#ff4466' : '#333';
                ctx.fillText('♥', W - 12 - i * 24, 30);
            }
            ctx.shadowBlur = 0;
        }

        function drawOverlay(title, sub1, sub2) {
            // Dim
            ctx.fillStyle = 'rgba(0,0,0,0.65)';
            ctx.fillRect(0, 0, W, H);
            // Box
            ctx.fillStyle = 'rgba(20,10,40,0.95)';
            ctx.beginPath();
            ctx.roundRect(W/2-170, H/2-110, 340, 220, 16);
            ctx.fill();
            ctx.strokeStyle = '#7B2FBE';
            ctx.lineWidth = 2;
            ctx.stroke();
            // Title
            ctx.font = '22px "Press Start 2P"';
            ctx.fillStyle = '#b06fff';
            ctx.textAlign = 'center';
            ctx.shadowColor = '#7B2FBE';
            ctx.shadowBlur = 16;
            ctx.fillText(title, W/2, H/2 - 50);
            // Sub
            ctx.shadowBlur = 0;
            ctx.font = '9px "Press Start 2P"';
            ctx.fillStyle = '#aaa';
            ctx.fillText(sub1, W/2, H/2 + 5);
            ctx.fillStyle = '#F0A500';
            ctx.fillText(sub2, W/2, H/2 + 35);
        }

        // ── Update ─────────────────────────────────────────────
        function update() {
            if (state !== 'playing') return;
            frameCount++;

            // Paddle movement
            if (keys['ArrowLeft'])  paddle.x -= 7;
            if (keys['ArrowRight']) paddle.x += 7;
            paddle.x = clamp(paddle.x, 0, W - PADDLE_W);

            // Level up every 10 points
            level = 1 + Math.floor(score / 10);
            spawnRate = Math.max(30, 80 - level * 6);

            // Spawn
            if (frameCount % spawnRate === 0) spawnItem();

            // Update items
            items.forEach(item => {
                item.y += item.vy;
                item.angle += item.spin;
            });

            // Collision & out-of-bounds
            items = items.filter(item => {
                // Paddle collision
                if (
                    item.y + ITEM_R >= PADDLE_Y &&
                    item.y - ITEM_R <= PADDLE_Y + PADDLE_H &&
                    item.x >= paddle.x - ITEM_R &&
                    item.x <= paddle.x + PADDLE_W + ITEM_R
                ) {
                    if (item.bomb) {
                        lives--;
                        spawnParticles(item.x, item.y, '#ff4444', 10);
                        if (lives <= 0) { state = 'over'; }
                    } else {
                        score++;
                        spawnParticles(item.x, item.y, '#FFD700', 12);
                    }
                    return false;
                }
                // Off bottom
                if (item.y - ITEM_R > H) {
                    if (!item.bomb) {
                        lives--;
                        if (lives <= 0) state = 'over';
                    }
                    return false;
                }
                return true;
            });

            // Particles
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                p.vy += 0.1;
                p.life -= p.decay;
            });
            particles = particles.filter(p => p.life > 0);
        }

        // ── Render ─────────────────────────────────────────────
        function render() {
            // Background
            ctx.fillStyle = '#0d0d2b';
            ctx.fillRect(0, 0, W, H);
            drawStars();

            if (state === 'start') {
                drawOverlay('AD BLITZ', 'CATCH $ COINS · DODGE ✕ BOMBS', 'CLICK OR PRESS SPACE TO START');
                return;
            }

            drawParticles();
            items.forEach(item => item.bomb ? drawBomb(item.x, item.y, item.angle) : drawCoin(item.x, item.y, item.angle));
            drawPaddle();
            drawHUD();

            if (state === 'paused') drawOverlay('PAUSED', '', 'PRESS SPACE TO RESUME');
            if (state === 'over')   drawOverlay('GAME OVER', 'FINAL SCORE: ' + score, 'CLICK OR SPACE TO RETRY');
        }

        // ── Loop ───────────────────────────────────────────────
        function loop() {
            update();
            render();
            requestAnimationFrame(loop);
        }
        loop();
        </script>
